name: Container CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./nike-store-nest-js
          push: false
          tags: shoes-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./tailwind4-vue3-nikeStore
          push: false
          tags: shoes-frontend:ci
          build-args: |
            VITE_API_BASE_URL=/api
