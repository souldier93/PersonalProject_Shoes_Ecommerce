services:
  mongo:
    image: mongo:7
    container_name: shoes-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./nike-store-nest-js
    container_name: shoes-backend
    restart: unless-stopped
    env_file:
      - ./nike-store-nest-js/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/nike-store
    depends_on:
      - mongo
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./tailwind4-vue3-nikeStore
      args:
        VITE_API_BASE_URL: /api
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    container_name: shoes-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo-data:
