services:
  gateway:
    image: nginx:1.27-alpine
    container_name: shoes-api-gateway
    volumes:
      - ./services/api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    ports:
      - "8081:8080"

  mongo:
    image: mongo:7
    container_name: shoes-mongo-ms
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-ms-data:/data/db

  backend:
    build:
      context: ./nike-store-nest-js
    container_name: shoes-backend-ms
    restart: unless-stopped
    env_file:
      - ./nike-store-nest-js/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/nike-store
      MONGO_DB_NAME: nike-store
    depends_on:
      - mongo

  frontend:
    build:
      context: ./tailwind4-vue3-nikeStore
      args:
        VITE_API_BASE_URL: /api
    container_name: shoes-frontend-ms
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  mongo-ms-data:
